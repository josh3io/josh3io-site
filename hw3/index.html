<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <title> Sign Up Page </title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
   <link rel="stylesheet" href="css/style.css">
</head>

<body class="align-items-center justify-content-center">
  <div class="outer container mt-2 p-3 border border-primary">
    <div class="header">
      <h1>Forex Market Data</h1>
    </div>
    <div class="note box">
      <img class="icon" src="img/1F4DD.svg" alt="note icon" >
      <div>
        Fetch the latest Euro exchange rates.<br>
        To reduce network traffic, exchange rates are cached locally for 24 hours.
      </div>
    </div>
  </div>
  <div class="outer container mt-2 p-3 border border-primary">
    <div class="mt-2 box">
      <div class="m-2">
        <div>Check conversion rates for:</div>
        <!-- only euro is supported as base for free API -->
        <div class="d-flex align-items-center justify-content-center">
          <input type="text" value="1" id="amount" class="m-1 form-control">Euro to
        </div>
        <div class="d-flex align-items-center justify-content-center">
          <div id="amountError" class="box d-flex justify-content-center text-danger d-none">of</div>
        </div>
      </div>
      <div>
        <select multiple id="symbols" name="symbols" size="10">
          <option value="">Loading symbols...</option>
        </select>
      </div>
      <div>
        <input type="button" id="fetchRatesBtn" value="Get Rates" class="btn btn-primary" disabled="disabled">
      </div>
      <div class="row">
        <div class="col text-danger" id="symbolsError"></div>
      </div>
    </div>
    <div class="display-6 d-none" id="displayBase"><span id="displayAmount"></span> Euro equals </div>
    <div id="conversionRateContainer" class="mt-2">
      <div class="col container box d-none" id="rates">
        <!--
          <div class="row">
            <div id="rate${symbol}symbol" class="col"></div>
            <div id="rate${symbol}rate" class="col"></div>
          </div>
        -->
      </div>
    </div>
  </div>
  <script src="js/forex.js"></script>
</body>
</html>
